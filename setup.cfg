[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Unit tests
    integration: Integration tests
    db: Database tests

[flake8]
max-line-length = 100
exclude = .git,__pycache__,dbt/target,venv,.venv
per-file-ignores =
    tests/*: F401
