pipeone:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'pipeone_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'pipeone_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'pipeone') }}"
      schema: public
      threads: 4
