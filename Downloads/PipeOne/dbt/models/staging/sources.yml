version: 2

sources:
  - name: raw
    schema: public
    description: "Raw tables written by the Python ingestion pipeline"
    tables:
      - name: github_events_raw
        description: "Raw GitHub public events, one row per event"
        columns:
          - name: event_id
            description: "Unique GitHub event ID (string)"
            tests: [not_null, unique]
          - name: event_type
            description: "GitHub event type e.g. PushEvent, WatchEvent"
            tests: [not_null]
          - name: actor_login
            description: "GitHub username of the actor"
          - name: repo_name
            description: "Full repository name (owner/repo)"
          - name: created_at
            description: "UTC timestamp of the event"

      - name: hn_stories_raw
        description: "Raw Hacker News top stories"
        columns:
          - name: hn_id
            description: "Hacker News item ID"
            tests: [not_null, unique]
          - name: title
            description: "Story title"
            tests: [not_null]
          - name: score
            description: "Current HN score (votes)"
          - name: comment_count
            description: "Number of comments (descendants)"

      - name: ingestion_log
        description: "Audit log of every pipeline run"
        columns:
          - name: id
            tests: [not_null, unique]
          - name: pipeline
            tests: [not_null]
          - name: status
            tests: [not_null]
